<script>
'use strict';

/* ══════════════════════════════════════════════════
   TOOL REGISTRY
══════════════════════════════════════════════════ */
const TOOLS={
  amplitude:{id:"amplitude",label:"Amplitude",domain:"amplitude.com",initial:"Am",tagline:"Product analytics",kw:["analytics","funnel","retention","dau","mau","event","conversion","metrics","amplitude","stats","track","cohort","chart","trends"]},
  hex:{id:"hex",label:"Hex",domain:"hex.tech",initial:"Hx",tagline:"Notebooks & data",kw:["sql","query","notebook","analysis","warehouse","database","hex","table","rows","select","from","explore"]},
  canva:{id:"canva",label:"Canva",domain:"canva.com",initial:"Cv",tagline:"Design templates",kw:["design","graphic","poster","social","banner","template","canva","brand","logo","visual","marketing","ad"]},
  figma:{id:"figma",label:"Figma",domain:"figma.com",initial:"Fg",tagline:"Diagrams & UI",kw:["figma","wireframe","mockup","diagram","flow","ui","ux","prototype","component","frame","layout"]},
  box:{id:"box",label:"Box",domain:"box.com",initial:"Bx",tagline:"File storage",kw:["file","storage","document","upload","folder","share","box","drive","pdf","download","find","attachment"]},
  clay:{id:"clay",label:"Clay",domain:"clay.com",initial:"Cl",tagline:"Lead enrichment",kw:["enrichment","prospect","lead","contact","clay","enrich","people","company","outreach","sales","crm","b2b"]},
  slack:{id:"slack",label:"Slack",domain:"slack.com",initial:"Sl",tagline:"Channels & search",kw:["slack","message","channel","dm","thread","notification","chat","send","workspace","search","mention"]},
  asana:{id:"asana",label:"Asana",domain:"asana.com",initial:"As",tagline:"Tasks & sprints",kw:["task","project","sprint","asana","deadline","assign","milestone","workflow","todo","done","issue","backlog"]},
  monday:{id:"monday",label:"Monday",domain:"monday.com",initial:"Mo",tagline:"Boards & pipelines",kw:["monday","board","item","status","column","pipeline","tracker","plan","roadmap","kanban"]},
};


/* ══════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════ */
const S={
  conn:{},   // id → {status:"off"|"ing"|"on"|"err", apiKey, ms, errMsg, user}
  msgs:[],
  busy:false,
  openKey:null,
  history:[]
};
Object.keys(TOOLS).forEach(id=>{S.conn[id]={status:"off",apiKey:"",ms:null,errMsg:null,user:null};});
S.msgs.push({
  id:0,role:"assistant",
  text:"Welcome. I am your unified MCP workspace connected to **9 tools**.\n\nConnect your apps using the sidebar — a green dot signals a live connection. Then type anything here:\n\n- I will **auto-detect** which tool fits your prompt\n- I will **show you** which tool was selected and how\n- Or **@mention** a tool directly — like `@slack search for deployment`",
  tool:null,result:null,loading:false,via:null
});

/* ══════════════════════════════════════════════════
   ROUTING
══════════════════════════════════════════════════ */
function detectTool(text){
  // 1. Explicit @mention always wins
  const m=text.match(/@([a-z]+)/i);
  if(m){
    const slug=m[1].toLowerCase();
    const found=Object.values(TOOLS).find(t=>t.id.startsWith(slug)||t.label.toLowerCase().startsWith(slug));
    if(found)return{tool:found,via:"mention"};
  }
  // 2. If a tool's exact name appears in the text, prioritize it
  const low=text.toLowerCase();
  for(const t of Object.values(TOOLS)){
    if(low.includes(t.label.toLowerCase()) || low.includes(t.id)){
      return{tool:t,via:"auto"};
    }
  }
  // 3. Fallback to keyword scoring
  let best=null,top=0;
  for(const t of Object.values(TOOLS)){
    let s=0;
    for(const k of t.kw)if(low.includes(k))s+=k.length;
    if(s>top){top=s;best=t;}
  }
  if(best&&top>=3)return{tool:best,via:"auto"};
  return null;
}

window._oauthSync = function(id) {
  const tool = TOOLS[id];
  const c = S.conn[id];
  if(c.status === "on" || c.status === "ing") return;
  
  c.status = "ing";
  c.errMsg = null;
  S.openKey = null;
  render();

  // Simulate opening browser popup for OAuth
  const w = window.open('', '_blank', 'width=550,height=650,left=200,top=100');
  if(w) {
    w.document.write(`
      <body style="font-family:'DM Sans',system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#fdf9ff;margin:0">
        <div style="background:#fff;border:1px solid rgba(201,168,76,0.5);border-radius:18px;padding:40px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,0.05);max-width:400px">
          <img src="https://www.google.com/s2/favicons?domain=${tool.domain}&sz=128" style="width:72px;height:72px;border-radius:14px;margin-bottom:24px"/>
          <h2 style="color:#0a0608;margin-bottom:12px;font-size:24px;font-weight:800">Connect ${tool.label}</h2>
          <p style="color:#7a5a90;font-size:15px;line-height:1.6;margin-bottom:30px">September AI needs your permission to access and modify your ${tool.label} workspaces and files.</p>
          <button id="auth-btn" onclick="document.getElementById('auth-btn').innerText='Authorizing...'; setTimeout(() => { document.body.innerHTML='<div style=\\\'text-align:center;font-family:sans-serif\\\'><h2 style=\\\'color:#1a7a3c;margin-bottom:10px\\\'>Connection Successful!</h2><p style=\\\'color:#7a5a90\\\'>You can safely close this window.</p></div>'; setTimeout(()=>window.close(), 1200) }, 800)" style="width:100%;padding:14px;background:#9d4edd;color:#fff;border:none;border-radius:10px;font-weight:800;font-size:15px;cursor:pointer;transition:transform 0.1s" onmouseover="this.style.transform='scale(1.02)'" onmouseleave="this.style.transform='scale(1)'">Authorize Access</button>
        </div>
      </body>
    `);
  } else {
    // If popup blocked, immediately connect
    c.status = "on"; c.ms = 45; c.user = "Connected User";
    render();
    return;
  }
  
  // Wait for window close to complete connection
  const check = setInterval(() => {
    if (!w || w.closed) {
      clearInterval(check);
      c.status = "on";
      c.ms = Math.floor(Math.random() * 30 + 10);
      c.user = tool.label + " Account";
      c.errMsg = null;
      render();
    }
  }, 500);
}

/* ══════════════════════════════════════════════════
   REAL CONNECTION  →  POST /api/connect
══════════════════════════════════════════════════ */
async function doConnect(id){
  const c=S.conn[id];
  if(!c.apiKey.trim()){c.status="err";c.errMsg="Please enter your API key";render();return;}
  c.status="ing";c.ms=null;c.errMsg=null;S.openKey=null;
  render();

  // Mock successful MCP connection if the user enters an MCP-like startup command/URL
  const val = c.apiKey.trim();
  if (val.startsWith("npx ") || val.startsWith("http") || val.startsWith("ws://") || val.startsWith("stdio") || val.startsWith("docker ")) {
    setTimeout(() => {
      c.status = "on"; c.ms = Math.floor(Math.random() * 20 + 10); c.user = "Local MCP Server"; c.errMsg = null;
      render();
    }, 600);
    return;
  }

  try{
    const res=await fetch('/api/connect',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({toolId:id,apiKey:val}),
    });
    const json=await res.json();
    if(json.ok){
      c.status="on";c.ms=json.latency||null;c.user=json.user||null;c.errMsg=null;
    }else{
      c.status="err";c.errMsg=json.error||"Connection failed";
    }
  }catch(e){
    c.status="err";c.errMsg="Server unreachable — is the server running?";
  }
  render();
}

async function doDisconnect(id){
  S.conn[id]={status:"off",apiKey:S.conn[id].apiKey,ms:null,errMsg:null,user:null};
  render();
}

function delHistory(id) {
  S.history = S.history.filter(h => h.id !== id);
  render();
}
function viewHistory(id) {
  // Placeholder for viewing past chat history in the UI
  console.log("Viewing history id: ", id);
}

/* ══════════════════════════════════════════════════
   REAL QUERY  →  POST /api/query
══════════════════════════════════════════════════ */
async function queryTool(tool,prompt){
  const c=S.conn[tool.id];
  const res=await fetch('/api/query',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({toolId:tool.id,apiKey:c.apiKey,prompt}),
  });
  const json=await res.json();
  if(!json.ok) throw new Error(json.error||"Query failed");
  return json.result;
}

/* ══════════════════════════════════════════════════
   SEND
══════════════════════════════════════════════════ */
async function send(){
  const el=gi("chat-input");
  const text=(el?.value||"").trim();
  if(!text||S.busy)return;
  el.value="";S.busy=true;
  S.msgs.push({id:Date.now(),role:"user",text});

  const det=detectTool(text);
  const tool=det?.tool||null;
  const via=det?.via||null;
  const connected=tool&&S.conn[tool.id].status==="on";

  const aid=Date.now()+1;
  let initText;
  if(!tool){
    initText="I could not detect a specific tool for that prompt. Try **@mentioning** a tool directly \u2014 like `@slack`, `@asana`, or `@amplitude` \u2014 or use keywords like *show funnel*, *find files*, or *sprint tasks*.";
  }else if(!connected){
    initText=`I matched this to **${tool.label}** (${via==="mention"?"directly mentioned":"auto-detected"}) \u2014 but that connector is not active yet.\n\nClick **CONNECT** next to **${tool.label}** in the sidebar to authorize access, then try again.`;
  }else{
    initText=null;
  }

  S.msgs.push({id:aid,role:"assistant",text:initText,tool:tool?.id||null,via,result:null,loading:connected&&!!tool});
  render();

  if(tool&&connected){
    // Try real API first, fall back to local mock MCP result
    try{
      const result=await queryTool(tool,text);
      const m=S.msgs.find(m=>m.id===aid);
      if(m){m.text=null;m.result=result;m.loading=false;}
    }catch(e){
      // Generate local mock MCP result as fallback
      const result = generateMockResult(tool, text);
      const m=S.msgs.find(m=>m.id===aid);
      if(m){m.text=null;m.result=result;m.loading=false;}
    }
  }

  // Save to history
  if(tool && connected) {
    const hid = Date.now();
    const title = text.length > 40 ? text.slice(0,40)+'...' : text;
    S.history.unshift({id: hid, title, date: new Date().toLocaleString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true})+' Today', toolId: tool.id});
    if(S.history.length > 20) S.history.pop();
  }

  S.busy=false;render();
  gi("chat-input")?.focus();
}
function handleKey(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}
function useSug(s){const el=gi("chat-input");if(el){el.value=s;el.focus();}}

/* ══════════════════════════════════════════════════
   RENDERERS
══════════════════════════════════════════════════ */
function renderOutput(res,tool){
  const{type,data}=res;
  if(type==="analytics") return rAnalytics(data,tool);
  if(type==="notebook")  return rNotebook(data);
  if(type==="canva")     return rCanva(data);
  if(type==="figma")     return rFigma(data);
  if(type==="files")     return rFiles(data);
  if(type==="crm")       return rCRM(data);
  if(type==="messaging") return rSlack(data);
  if(type==="tasks")     return rAsana(data);
  if(type==="board")     return rMonday(data);
  return`<pre style="color:#1a0a30;font-size:11px;overflow:auto;padding:12px;background:#f0eaff;border-radius:8px;border:1px solid rgba(201,168,76,0.3)">${JSON.stringify(data,null,2)}</pre>`;
}

function rAnalytics(d,tool){
  const max=d.funnel?.[0]?.n||1;
  return`
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
    ${(d.metrics||[]).map(m=>`
    <div style="background:#fdf9ff;border:1.5px solid rgba(201,168,76,0.4);border-radius:12px;padding:14px 16px">
      <div style="color:#7a5a90;font-size:10px;text-transform:uppercase;letter-spacing:1.4px;font-weight:800;margin-bottom:5px">${esc(m.l)}</div>
      <div style="color:#0a0608;font-size:22px;font-weight:800;letter-spacing:-.5px;font-family:'Playfair Display',serif">${esc(String(m.v))}</div>
      <div style="color:${m.up?'#1a7a3c':'#c42020'};font-size:12px;margin-top:4px;font-weight:700">${m.up?'+':'−'} ${esc(m.d)}</div>
    </div>`).join('')}

function rFigma(d){
  const nodes=d.nodes||[], edges=d.edges||[], nm={};
  nodes.forEach(n=>nm[n.id]=n);
  const uid='fig_'+Date.now();
  const desc=d.desc||'';

  // Build colored roadmap-style nodes
  const nodeEls=nodes.map(n=>{
    const w=n.w||120, h=n.h||50, bg=n.bg||'#FFF', fg=n.fg||'#333', bdr=n.border||bg;
    
    return `
    <div id="${uid}_n${n.id}" onclick="window._figSelect('${uid}',${n.id})" style="position:absolute;left:${n.x}px;top:${n.y}px;width:${w}px;min-height:${h}px;padding:10px 14px;background:${bg};border:2px solid ${bdr};border-radius:8px;cursor:pointer;text-align:center;font-size:11px;font-weight:700;color:${fg};box-shadow:0 2px 8px rgba(0,0,0,0.1);z-index:2;display:flex;align-items:center;justify-content:center;line-height:1.4;white-space:pre-line;user-select:none">${esc(n.l||'')}</div>`;
  }).join('');

  // Flow arrows between connected nodes
  const edgeSvg=edges.map(([a,b])=>{
    const na=nm[a],nb=nm[b];
    if(!na||!nb)return'';
    const aw=na.w||120, bw=nb.w||120, ah=na.h||50;
    const x1=na.x+aw, y1=na.y+ah/2, x2=nb.x, y2=nb.y+(nb.h||50)/2;
    const mx=(x1+x2)/2;
    return `<path d="M${x1},${y1} L${mx-10},${y1} L${mx-10},${y2} L${x2},${y2}" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#${uid}_arr)"/>`;
  }).join('');

  return `
  <div style="width:100%;border-radius:14px;border:1px solid rgba(157,78,221,0.3);overflow:hidden;background:#2C2C2C">
    <!-- Header -->
    <div style="padding:12px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #444">
      <svg width="14" height="20" viewBox="0 0 38 57" fill="none"><path d="M19 28.5a9.5 9.5 0 119 9.5 9.5 9.5 0 01-9-9.5z" fill="#1ABCFE"/><path d="M0 47.5A9.5 9.5 0 019.5 38H19v9.5a9.5 9.5 0 11-19 0z" fill="#0ACF83"/><path d="M19 0v19h9.5a9.5 9.5 0 000-19H19z" fill="#FF7262"/><path d="M0 9.5A9.5 9.5 0 009.5 19H19V0H9.5A9.5 9.5 0 000 9.5z" fill="#F24E1E"/><path d="M0 28.5A9.5 9.5 0 009.5 38H19V19H9.5A9.5 9.5 0 000 28.5z" fill="#A259FF"/></svg>
      <span style="color:#ccc;font-size:14px;font-weight:600">Figma</span>
    </div>
    <!-- Canvas with dotted grid -->
    <div style="background:#e8e8e8;background-image:radial-gradient(circle,#ccc 1px,transparent 1px);background-size:20px 20px;position:relative;min-height:320px;padding:20px;overflow:auto">
      <svg style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1"><defs><marker id="${uid}_arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#555"/></marker></defs>${edgeSvg}</svg>
      ${nodeEls}
    </div>
    <!-- Bottom toolbar like Claude -->
    <div style="background:#2C2C2C;padding:10px 18px;display:flex;justify-content:flex-end;align-items:center;gap:12px;border-top:1px solid #444">
      <a href="https://www.figma.com" target="_blank" rel="noopener" style="text-decoration:none;display:flex;align-items:center;gap:8px;background:#3C3C3C;border:1px solid #555;border-radius:8px;padding:6px 14px;color:#ddd;font-size:12px;font-weight:600;cursor:pointer">
        <svg width="12" height="18" viewBox="0 0 38 57" fill="none"><path d="M19 28.5a9.5 9.5 0 119 9.5 9.5 9.5 0 01-9-9.5z" fill="#1ABCFE"/><path d="M0 47.5A9.5 9.5 0 019.5 38H19v9.5a9.5 9.5 0 11-19 0z" fill="#0ACF83"/><path d="M19 0v19h9.5a9.5 9.5 0 000-19H19z" fill="#FF7262"/><path d="M0 9.5A9.5 9.5 0 009.5 19H19V0H9.5A9.5 9.5 0 000 9.5z" fill="#F24E1E"/><path d="M0 28.5A9.5 9.5 0 009.5 38H19V19H9.5A9.5 9.5 0 000 28.5z" fill="#A259FF"/></svg>
        Edit in Figma
      </a>
      <div style="display:flex;align-items:center;gap:2px">
        <button onclick="window._figZoom('${uid}',-1)" style="width:30px;height:30px;background:#3C3C3C;border:1px solid #555;border-radius:6px 0 0 6px;color:#ddd;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center">−</button>
        <button onclick="window._figZoom('${uid}',1)" style="width:30px;height:30px;background:#3C3C3C;border:1px solid #555;border-left:none;border-radius:0 6px 6px 0;color:#ddd;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center">+</button>
      </div>
    </div>
  </div>
  ${desc ? `<div style="color:var(--text-primary);font-size:15px;font-weight:500;line-height:1.9;margin-top:20px">${fmt(desc)}</div>` : ''}`;
}
window._figSelect=function(uid,nid){
  document.querySelectorAll('[id^="'+uid+'_n"]').forEach(el=>{el.style.outline='none';el.dataset.sel='';});
  const el=document.getElementById(uid+'_n'+nid);
  if(el){el.style.outline='3px solid #9d4edd';el.dataset.sel='1';}
};
window._figZoom=function(uid,dir){
  const canvas=document.querySelector('[style*="radial-gradient"]');
  if(!canvas) return;
  const cur=parseFloat(canvas.dataset.zoom||'1');
  const nz=Math.max(0.5,Math.min(2,cur+(dir*0.15)));
  canvas.dataset.zoom=nz;
  canvas.style.transform='scale('+nz+')';
  canvas.style.transformOrigin='top left';
};
window._figAddNode=function(uid){
  const canvases=document.querySelectorAll('[style*="radial-gradient"]');
  const canvas=canvases[canvases.length-1];
  if(!canvas)return;
  const nid=Date.now(),d=document.createElement('div');
  d.id=uid+'_n'+nid;d.innerText='New Node';
  d.onclick=function(){window._figSelect(uid,nid);};
  d.style.cssText='position:absolute;left:200px;top:200px;width:120px;min-height:50px;padding:10px 14px;background:#FFF;border:2px solid #333;border-radius:8px;cursor:pointer;text-align:center;font-size:11px;font-weight:700;color:#333;box-shadow:0 2px 8px rgba(0,0,0,0.1);z-index:2;display:flex;align-items:center;justify-content:center;user-select:none;animation:fadeIn 0.3s ease';
  canvas.appendChild(d);
  window._figSelect(uid,nid);
};

function gi(id){return document.getElementById(id);}
function esc(s){return String(s||'').replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function fmt(s){return esc(s).replace(/\*\*(.+?)\*\*/g,'<strong style="color:var(--violet-glow);font-weight:800">$1</strong>').replace(/`(.+?)`/g,'<code style="background:rgba(157,78,221,0.15);border:1px solid var(--border-glass);border-radius:6px;padding:2px 7px;font-family:var(--font-mono);font-size:13px;color:var(--violet-glow);font-weight:600">$1</code>').replace(/\n/g,'<br>');}

function render(){
  gi("root").innerHTML=buildApp();
  const inp=gi("chat-input");
  if(inp){inp.addEventListener("keydown",handleKey);inp.focus();}
  setTimeout(()=>gi("cb")?.scrollIntoView({behavior:"smooth"}),40);
}

}

      </div>
    </div>
    
    <div style="flex:1;overflow-y:auto;padding:0">
      <div style="padding:18px 24px 6px">
        <div style="color:var(--text-muted);font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:2px">Connectors</div>
      </div>
      <div style="padding:6px 14px 14px">
        ${Object.values(TOOLS).map(buildToolRow).join('')}
      </div>

      <div style="padding:10px 24px 6px">
        <div style="color:var(--text-muted);font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:2px">Recent Chats</div>
      </div>
      <div style="padding:6px 14px 14px">
        ${S.history.length === 0 ? `<div style="padding:20px; text-align:center; color:var(--text-muted); font-size:11px; font-weight:600; border:1px dashed var(--border-glass); border-radius:12px">No recent chats</div>` : ''}
        ${S.history.map(h => `
        <div class="tool-row" style="padding:10px 14px;border-radius:12px;cursor:pointer;margin-bottom:4px;transition:background 0.2s;display:flex;justify-content:space-between;align-items:center" onmouseover="this.style.background='rgba(255,255,255,0.05)'" onmouseleave="this.style.background='transparent'" onclick="viewHistory(${h.id})">
          <div style="min-width:0;flex:1">
            <div style="color:var(--text-primary);font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(h.title)}</div>
            <div style="color:var(--text-muted);font-size:11px;font-weight:500;margin-top:4px">${esc(h.date)}</div>
          </div>
          <button onclick="event.stopPropagation(); delHistory(${h.id})" style="background:transparent;border:none;color:var(--text-muted);cursor:pointer;padding:6px;border-radius:6px" onmouseover="this.style.background='rgba(255,77,77,0.15)';this.style.color='var(--error)'" onmouseleave="this.style.background='transparent';this.style.color='var(--text-muted)'" title="Delete Chat">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
          </button>
        </div>
        `).join('')}
      </div>
    </div>

    <div style="padding:20px 24px 24px;border-top:1px solid var(--border-glass);background:rgba(0,0,0,0.1)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="color:var(--text-secondary);font-size:11px;font-weight:800">STATUS</div>
        <div style="background:rgba(157,78,221,0.2);border:1px solid var(--border-glass);border-radius:20px;padding:3px 12px;font-size:11px;font-weight:900;color:var(--violet-main)">${n}/9 ACTIVE</div>
      </div>
      <div style="color:var(--text-muted);font-size:11px;line-height:1.7;font-weight:600">The most powerful unified interface for your AI agents.</div>
    </div>
  </div>`;
}

function buildToolRow(tool) {
  const c = S.conn[tool.id];
  const st = c.status;
  const isOn = st === "on", isIng = st === "ing", isErr = st === "err";

  const stPill = isOn 
    ? `<div style="background:rgba(0,255,136,0.15);color:var(--success);padding:4px 10px;border-radius:12px;font-size:10px;font-weight:900;display:flex;align-items:center;gap:6px">
         <span style="width:6px;height:6px;border-radius:50%;background:var(--success);box-shadow:0 0 8px var(--success)"></span> ACTIVE
       </div>`
    : isIng
    ? `<div style="background:rgba(255,204,0,0.15);color:var(--gold-accent);padding:4px 10px;border-radius:12px;font-size:10px;font-weight:900;display:flex;align-items:center;gap:6px">
         AUTHORIZING...
       </div>`
    : isErr
    ? `<div style="background:rgba(255,77,77,0.15);color:var(--error);padding:4px 10px;border-radius:12px;font-size:10px;font-weight:900;display:flex;align-items:center;gap:6px" title="${esc(c.errMsg)}">
         ERROR
       </div>`
    : `<div style="background:var(--violet-main);color:#fff;padding:6px 12px;border-radius:8px;font-size:10px;font-weight:800;display:flex;align-items:center;gap:6px;box-shadow:0 2px 8px rgba(157,78,221,0.4)">
         CONNECT
       </div>`;

  let action = '';
  if (isOn) {
    action = `<button onclick="event.stopPropagation(); window._disc('${tool.id}')" style="background:transparent;border:none;color:var(--text-muted);cursor:pointer;padding:4px;" title="Disconnect">✕</button>`;
  }

  const errText = isErr && c.errMsg ? `<div style="color:var(--error);font-size:10px;margin-top:6px;font-weight:600">${esc(c.errMsg)}</div>` : '';

  const activeStyles = isOn ? 'background:rgba(157,78,221,0.08);border-color:var(--violet-main)' : 'background:transparent;border-color:transparent';

  return `
  <div style="border:1px solid transparent;border-radius:12px;padding:10px;margin-bottom:4px;cursor:pointer;transition:all 0.2s;${activeStyles}" class="tool-row" onclick="${!isOn && !isIng ? `window._oauthSync('${tool.id}')` : ''}" onmouseover="if(!${isOn}) this.style.background='rgba(255,255,255,0.03)'" onmouseleave="if(!${isOn}) this.style.background='transparent'">
    <div style="display:flex;align-items:center;gap:12px">
      <img src="https://www.google.com/s2/favicons?domain=${tool.domain}&sz=64" style="width:26px;height:26px;border-radius:6px;background:#fff;padding:2px;flex-shrink:0" />
      <div style="flex:1;min-width:0;display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="color:var(--text-primary);font-weight:700;font-size:14px;letter-spacing:-.2px">${esc(tool.label)}</div>
          ${errText}
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          ${stPill}
          ${action}
        </div>
      </div>
    </div>
  </div>`;
}


/* ── TOP BAR ──────────────────────────────────── */
function buildTopBar(){
  const live = Object.entries(S.conn).filter(([, c]) => c.status === "on").map(([id]) => TOOLS[id]);
  return `
  <div class="elegant-glass" style="padding:16px 36px;display:flex;align-items:center;gap:20px;background:rgba(8, 0, 20, 0.4);border-bottom:1px solid var(--border-glass);flex-shrink:0">
    <div style="flex:1;min-width:0">
      <div style="color:var(--violet-glow);font-weight:900;font-size:22px;letter-spacing:-.5px;font-family:var(--font-serif)">Intelligence Hub</div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:3px;font-weight:700;display:flex;align-items:center;gap:6px">
        <span style="width:7px;height:7px;border-radius:50%;background:${live.length > 0 ? 'var(--success)' : 'var(--text-muted)'};box-shadow:0 0 10px ${live.length > 0 ? 'var(--success)' : 'transparent'}"></span>
        ${live.length === 0 ? 'Connect tools to activate global search' : `Actively synced with: ${live.map(t => `<span style="color:var(--text-primary);font-weight:900">${esc(t.label)}</span>`).join(', ')}`}
      </div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;flex-shrink:0">
      ${live.map(t => `<div title="${esc(t.label)} — Active" style="width:34px;height:34px;border-radius:10px;background:rgba(157, 78, 221, 0.15);border:1px solid var(--border-glass-bright);display:flex;align-items:center;justify-content:center"><span style="font-size:12px;font-weight:900;color:var(--violet-glow)">${esc(t.initial)}</span></div>`).join('')}
    </div>
  </div>`;
}

/* ── MESSAGES ─────────────────────────────────── */
function buildMsg(msg) {
  if (msg.role === "user") return `
  <div class="msg-user" style="display:flex;justify-content:flex-end;margin-bottom:28px">
    <div class="elegant-glass" style="max-width:75%;border-radius:24px 24px 4px 24px;padding:18px 24px;color:var(--text-primary);font-size:16px;font-weight:600;line-height:1.7;box-shadow:0 8px 32px rgba(157, 78, 221, 0.15)">${fmt(msg.text)}</div>
  </div>`;

  const tool = msg.tool ? TOOLS[msg.tool] : null;
  return `
  <div class="msg-ai" style="display:flex;gap:20px;margin-bottom:36px;align-items:flex-start">
    <div style="width:40px;height:40px;border-radius:12px;flex-shrink:0;background:${tool ? 'transparent' : 'var(--bg-glass-heavy)'};display:flex;align-items:center;justify-content:center;margin-top:4px;box-shadow:0 0 15px rgba(157, 78, 221, 0.2);overflow:hidden;border:1px solid var(--border-glass-bright)">
      ${tool ? `<img src="https://www.google.com/s2/favicons?domain=${tool.domain}&sz=128" style="width:100%;height:100%;background:#fff;padding:4px" />` : `<span style="font-size:18px;font-weight:900;color:#fff;font-family:var(--font-serif)">S</span>`}
    </div>
    <div style="flex:1;min-width:0">
      ${tool ? `<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap">

        <span style="background:rgba(157, 78, 221, 0.2);color:var(--violet-glow);border:1px solid var(--border-glass-bright);border-radius:10px;padding:5px 14px;font-size:13px;font-weight:900;letter-spacing:1px;text-transform:uppercase">${esc(tool.label)}</span>
        <span style="color:var(--text-muted);font-size:12px;font-weight:700">${msg.via === "mention" ? "DIRECT INVOKE" : msg.via === "auto" ? "INTELLIGENT ROUTER" : ""}</span>
        ${msg.loading ? `<span style="display:inline-flex;gap:4px;align-items:center;margin-left:4px">
          <span class="tdot" style="width:6px;height:6px;background:var(--violet-main);animation: glowPulse 1s infinite alternate; animation-delay:0s"></span>
          <span class="tdot" style="width:6px;height:6px;background:var(--violet-main);animation: glowPulse 1s infinite alternate; animation-delay:.2s"></span>
          <span class="tdot" style="width:6px;height:6px;background:var(--violet-main);animation: glowPulse 1s infinite alternate; animation-delay:.4s"></span>
        </span>` : ''}
      </div>` : ''}
      ${msg.text != null ? `<div style="color:var(--text-primary);font-size:16px;font-weight:500;line-height:1.8;margin-bottom:${msg.result ? 20 : 0}px">${fmt(msg.text)}</div>` : ''}
      ${msg.loading && msg.text == null && !tool ? `<span style="display:inline-flex;gap:4px;align-items:center"><span class="tdot" style="width:6px;height:6px;background:var(--violet-main);animation: glowPulse 1s infinite; animation-delay:0s"></span><span class="tdot" style="width:6px;height:6px;background:var(--violet-main);animation: glowPulse 1s infinite; animation-delay:.2s"></span><span class="tdot" style="width:6px;height:6px;background:var(--violet-main);animation: glowPulse 1s infinite; animation-delay:.4s"></span></span>` : ''}
      ${msg.result ? `
      <div class="premium-card" style="overflow:hidden">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border-glass)">
          <div style="min-width:0">
            <div style="color:var(--text-primary);font-weight:900;font-size:20px;font-family:var(--font-serif)">${esc(msg.result.title || '')}</div>
            <div style="color:var(--text-muted);font-size:13px;margin-top:4px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:500px">${esc(msg.result.summary || '')}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:16px">
            <span style="width:8px;height:8px;border-radius:50%;background:var(--success);box-shadow: 0 0 10px var(--success)"></span>
            <span style="color:var(--success);font-size:11px;font-weight:900;letter-spacing:1px">REALTIME</span>
          </div>
        </div>
        <div class="result-grid-auto">
          ${renderOutput(msg.result, tool)}
        </div>
      </div>` : ''}
    </div>
  </div>`;
}

/* ── SUGGESTIONS ──────────────────────────────── */
const SUGS=["@amplitude show funnel conversion","@hex query top users last 30 days","@slack search for deployment updates","@asana show sprint tasks","@box find brand assets","@clay enrich leads","@monday show project board","@canva list design templates","@figma diagram the auth flow"];
function buildSugs() {
  return `
  <div style="padding:16px 0;display:flex;gap:12px;overflow-x:auto;flex-shrink:0;scrollbar-width:none">
    ${SUGS.map(s => `<button onclick="useSug('${s.replace(/'/g, "\\'")}')" class="elegant-glass" style="border-radius:14px;color:var(--text-secondary);padding:9px 20px;font-size:13px;font-weight:700;white-space:nowrap;flex-shrink:0;cursor:pointer">${s}</button>`).join('')}
  </div>`;
}

/* ── INPUT ────────────────────────────────────── */
function buildInput() {
  const anyOn = Object.values(S.conn).some(c => c.status === "on");
  return `
  <div style="padding:16px 0 24px;flex-shrink:0;background:transparent">
    <div style="display:flex;gap:16px;align-items:flex-end">
      <div class="elegant-glass" style="flex:1;border-radius:20px;padding:4px">
        <textarea id="chat-input" rows="2"
          placeholder="${anyOn ? 'Ask anything \u2014 intelligent router will find the right tool...' : 'Connect a tool first, or type to see which tool matches...'}"
          style="width:100%;height:68px;background:transparent;border:none;padding:16px 20px;color:var(--text-primary);font-size:16px;font-weight:500;resize:none;outline:none;line-height:1.6;display:block"
          ${S.busy ? 'disabled' : ''}></textarea>
      </div>

      <button onclick="send()" ${S.busy ? 'disabled' : ''}
        style="width:68px;height:68px;border-radius:20px;border:1px solid ${S.busy ? 'var(--border-glass)' : 'var(--border-glass-bright)'};background:${S.busy ? 'rgba(157,78,221,0.1)' : 'var(--violet-main)'};color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:${S.busy ? 'not-allowed' : 'pointer'};box-shadow:${S.busy ? 'none' : '0 10px 30px rgba(157, 78, 221, 0.3)'}">
        ${S.busy ? '<span class="tdot" style="width:6px;height:6px;background:#fff;animation: glowPulse 1s infinite alternate"></span>' : '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>'}
      </button>
    </div>
    <div style="color:var(--text-muted);font-size:11px;margin-top:14px;text-align:center;font-weight:800;letter-spacing:1.5px;text-transform:uppercase">Intelligence Routing Active · Direct Invocation via @tool</div>
  </div>`;
}

/* ══════════════════════════════════════════════════
   GLOBALS
══════════════════════════════════════════════════ */
window._openKey=function(id){S.openKey=S.openKey===id?null:id;render();setTimeout(()=>gi(`key-${id}`)?.focus(),60);};
window._conn=function(id){const el=gi(`key-${id}`);if(el)S.conn[id].apiKey=el.value.trim();doConnect(id);};
window._disc=doDisconnect;
window.send=send;
window.useSug=useSug;

render();
</script>
</body>
</html>
